<!Doctype html>
<html lang="en">
<head>
 <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
 <title> Calender</title> 
 <link rel = "stylesheet" href="/static/style.css">
 <link rel = "stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body id = "calender-body">
<nav class="navbar">
        <ul>
            <img src="/static/stick_thing.webp" class="logo">
            <li><a href="{{url_for('index')}}">Home</a></li>
            <li><a href="{{url_for('calendar_page')}}">Calendar</a></li>
            <li><a href="{{url_for('tournament_page')}}">Tournaments</a></li>
            <li><a href="{{url_for('leaderboard_page')}}">Leaderboard</a></li>
            <li><a href="{{url_for('chat_page')}}">Chat</a></li>
            {% if logged_in %}
                <li><a href="#" onclick="handleLogout(event)">Logout</a></li>
            {% else %}
                <li><a href="{{ url_for('login_page') }}">Login</a></li>
                <li><a href="{{ url_for('signup_page') }}">Sign up</a></li>
            {% endif %}
        </ul>
    </nav>
    
      <div class="container">
        <div class="calender-container">
            <div class="calendar-header">
                <div class="nav-buttons">
                    <button class ="nav-btn" id = "prev-month">
                         <i class = "fasfa-chevron-left"> </i>
                    </button>
                    <button class ="nav-btn" id = "next-month">
                        <i class = "fasfa-chevron-right"> </i>
                    </button>
                </div>
                <div class ="month-year" id = "month-year">
                    May 2026
                </div>
            </div>

            <div class = "weekdays">
                <div class = "weekday">Sun</div>
                <div class = "weekday">Mon</div>
                <div class = "weekday">Tue</div>
                <div class = "weekday">Wed</div>
                <div class = "weekday">Thu</div>
                <div class = "weekday">Fri</div>
                <div class = "weekday">Sat</div>
            </div>

            <div class ="days" id ="days"></div>

            <div class = "calendar-footer">
                <button class = "today-btn" id = "today-btn">
                    <i class = "fasfa-calendar-day"> </i>
                    Today
                </button>
                <div class ="event-indicator">
                    <i class = "fas fa-circle" style ="color: var(--accent); 
                    font-size: 0.6 rem;"></i>
                    <span> Has events</span>
                </div>
            </div>

        </div>
    
   
        <div class = "event-panel" id="event-panel">
            <div class ="event-header">
                <div class ="event-date" id="event-date"> Select a date
                </div>
                <i class = "fas fasfa-calendar-alt event icon"></i>
                </div>
                <div class = "event-list" id = "event-list">
                    <div class = "no-events"> Select a date with events to view them game-header</div>
                </div>
            </div>
        </div>
        
        <script src = "/static/script.js"></script>
</body>
</html>
