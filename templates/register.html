<!DOCTYPE html>
<html>
<head>
    <title>Tournament Sign Up</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js"></script>
</head>
<body>
    <nav>
    <div class="logo-container"> 
        <img src="/static/stick_thing.webp" class="logo" alt="Logo">
        <h2 class="nav-title">Fighting Game Club</h2>
    </div>

    <ul class="nav-links">
        <li><a href="{{url_for('index')}}">Home</a></li>
        <li><a href="{{url_for('calendar_page')}}">Calendar</a></li>
        <li><a href="{{url_for('tournament_page')}}">Tournaments</a></li>
        <li><a href="{{url_for('leaderboard_page')}}">Leaderboard</a></li>
        {% if logged_in %}
            <li><a href="#" onclick="handleLogout(event)">Logout</a></li>
        {% else %}
            <li><a href="{{ url_for('login_page') }}">Login</a></li>
        {% endif %}
    </ul>
</nav>

    <main>
        <section class="signup-page-card">
            <h1>Tournament Sign Up</h1>
            <p>Sign up for an upcoming tournament.</p>

            <form class="signup-form">
                <label for="gameSelect">1. Choose Game:</label>
                <select id="gameSelect" onchange="filterTournaments()">
                    <option value="">-- Select a Game --</option>
                    <option value="Street Fighter">Street Fighter</option>
                    <option value="Tekken">Tekken</option>
                    <option value="Guilty Gear">Guilty Gear</option>
                </select>

                <label for="tournamentSelect">2. Choose Tournament:</label>
                <select id="tournamentSelect" disabled>
                    <option value="">-- Select a Game First --</option>
                </select>

                <button type="button" onclick="joinTournament(event)" style="margin-top: 20px;">Join Bracket</button>
            </form>

            <p id="signupMessage" class="signup-message" style="margin-top: 15px; font-weight: bold;"></p>
        </section>
    </main>

    <script src="static/script.js"></script>
    <script>
        const allTournaments = [
            {% for t in tournaments %}
                { id: {{ t.id }}, name: "{{ t.name }}", game: "{{ t.game }}" },
            {% endfor %}
        ];
    </script>
</body>
</html>
