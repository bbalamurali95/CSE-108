<!DOCTYPE html>
<html>
<head>
     <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="static/styles.css">
</head>
<body onload="loadLeaderboard()">
    <nav>
    <div class="logo-container"> 
        <img src="/static/stick_thing.webp" class="logo" alt="Logo">
        <h2 class="nav-title">Fighting Game Club</h2>
    </div>

    <ul class="nav-links">
        <li><a href="{{url_for('index')}}">Home</a></li>
        <li><a href="{{url_for('calendar_page')}}">Calendar</a></li>
        <li><a href="{{url_for('tournament_page')}}">Tournaments</a></li>
        <li><a href="{{url_for('leaderboard_page')}}">Leaderboard</a></li>
        <li><a href="{{url_for('login_page')}}">Login</a></li>
    </ul>
</nav>

    <main>
        <section class="leaderboard-hero">
            <div>
                <h1>Club Leaderboards</h1>
                <p>Track the top players in Street Fighter, Tekken, and Guilty Gear tournaments.</p>
            </div>

            <div class="leaderboard-stats">
                <div class="stat-card">
                    <h2>24</h2>
                    <p>Registered Players</p>
                </div>
                <div class="stat-card">
                    <h2>52</h2>
                    <p>Total Tournaments</p>
                </div>
                <div class="stat-card">
                    <h2>3</h2>
                    <p>Main Games</p>
                </div>
            </div>
        </section>

        <section class="leaderboard-section">
            <div class="leaderboard-controls">
                <label for="gameSelect">Select Leaderboard:</label>
                <select id="gameSelect" onchange="loadLeaderboard()">
                    <option value="Overall">Overall</option>
                    <option value="Street Fighter">Street Fighter</option>
                    <option value="Tekken">Tekken</option>
                    <option value="Guilty Gear">Guilty Gear</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Main Game</th>
                        <th>Tournament Wins</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
        </section>
    </main>

    <script src="static/scripts.js"></script>
</body>
</html>
