<!DOCTYPE html>
<html lang = "en">

<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="/static/script.js"></script>
</head>


<body id = "login-body">
    <nav class="navbar">
        <ul>
            <img src="/static/logo.png" class="logo">
            <li><a href="{{url_for('index')}}">Home</a></li>
            <li><a href="{{url_for('calendar_page')}}">Calendar</a></li>
            <li><a href="{{url_for('tournament_page')}}">Tournaments</a></li>
            <li><a href="{{url_for('leaderboard_page')}}">Leaderboard</a></li>
            <li><a href="{{url_for('chat_page')}}">Chat</a></li>
            <li><a href="{{url_for('login_page')}}">Login</a></li>
            <li><a href="{{url_for('signup_page')}}">Sign up</a></li>
        </ul>
    </nav>
    
    <div class = "wrapper">
        <form onsubmit="handleLogin(event); return false;">
            <h1>Login </h1>
            <div class = "input-box">
                <input type = "text" id="usernameBox" placeholder="Username" required>
                <i class='bx bx-user'></i>
            </div>
            <div class = "input-box">
                <input type = "password" id="passwordBox" placeholder="Password" required>
                <i class='bx bx-lock-alt'></i>
            </div>
           <button type = "submit" class ="btn"> Login</button>
           <div class = "register-link">
            <p> Create an account here:  <a href= "{{url_for('signup_page')}}"> Register </a></p>
           </div>
        </form>
    </div>
</body>
</html>
