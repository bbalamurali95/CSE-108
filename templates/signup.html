<html lang = "en">

    <meta charset = "UTF-8">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="/static/script.js"></script>
</head>


<body id = "login-body">
    <nav>
    <div class="logo-container"> 
        <img src="/static/stick_thing.webp" class="logo" alt="Logo">
        <h2 class="nav-title">Fighting Game Club</h2>
    </div>

    <ul class="nav-links">
        <li><a href="{{url_for('index')}}">Home</a></li>
        <li><a href="{{url_for('calendar_page')}}">Calendar</a></li>

    <div class = "wrapper">
        <form id="signupForm" onsubmit="createUser(event)">
            <h1>Sign up </h1>
            <div class = "input-box">
                <input type = "text" id="usernameBox" placeholder="Username" required>
                <i class='bx bx-user'></i>
            </div>
            <div class = "input-box">
                <input type = "password" id="passwordBox" placeholder="password" required>
                <i class='bx bx-lock-alt'></i>
            </div>
           <button type = "submit" class ="btn">Sign Up</button>
          
        </form>
    </div>
